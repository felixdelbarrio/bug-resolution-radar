name: Build Binary (Windows)

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    if: github.ref == 'refs/heads/master'
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install frontend dependencies
        run: npm --prefix frontend install

      - name: Build frontend
        run: npm --prefix frontend run build

      - name: Verify desktop runtime dependencies
        shell: pwsh
        run: |
          python -c "import importlib.util,sys;missing=[m for m in ('fastapi','uvicorn','webview') if importlib.util.find_spec(m) is None];sys.exit('Missing desktop runtime modules: ' + ', '.join(missing)) if missing else print('Desktop runtime dependencies OK')"

      - name: Run backend/runtime regression tests
        shell: pwsh
        run: |
          pytest -q tests/test_run_desktop_entrypoint.py
          pytest -q tests/test_api_app.py
          pytest -q tests/test_architecture_boundaries.py
          pytest -q tests/test_executive_report_ppt.py
          pytest -q tests/test_period_followup_report_ppt.py

      - name: Generate Windows .ico from PNG
        shell: pwsh
        run: |
          python scripts/update_app_icon.py --input assets/app_icon/bug-resolution-radar.png

      - name: Build executable with PyInstaller
        shell: pwsh
        run: |
          $args = @(
            "--noconfirm",
            "--clean",
            "--onefile",
            "--windowed",
            "--name", "bug-resolution-radar",
            "--icon", "assets/app_icon/bug-resolution-radar.ico",
            "--workpath", "build",
            "--specpath", "build",
            "--distpath", "dist",
            "--add-data", "frontend/dist;frontend_dist"
          )
          if (Test-Path ".env.example" -PathType Leaf) {
            $args += @("--add-data", ".env.example;.")
          }
          $args += @(
            "--paths", "src",
            "--collect-all", "bug_resolution_radar.analytics",
            "--collect-all", "bug_resolution_radar.api",
            "--collect-all", "bug_resolution_radar.common",
            "--collect-all", "bug_resolution_radar.ingest",
            "--collect-all", "bug_resolution_radar.models",
            "--collect-all", "bug_resolution_radar.repositories",
            "--collect-all", "bug_resolution_radar.reports",
            "--collect-all", "bug_resolution_radar.services",
            "--collect-all", "bug_resolution_radar.theme",
            "--collect-all", "fastapi",
            "--collect-all", "starlette",
            "--collect-all", "uvicorn",
            "--collect-all", "webview",
            "--collect-all", "plotly",
            "--collect-all", "pptx",
            "--collect-all", "lxml",
            "--collect-all", "PIL",
            "--collect-all", "openpyxl",
            "--collect-all", "xlsxwriter",
            "--collect-all", "numpy",
            "--collect-all", "browser_cookie3",
            "run_desktop.py"
          )
          pyinstaller @args

      - name: Prepare distributable bundle
        shell: pwsh
        run: |
          $bundleDir = "build_bundle/bug-resolution-radar-windows"
          New-Item -ItemType Directory -Force -Path "$bundleDir/dist" | Out-Null
          Copy-Item "dist/bug-resolution-radar.exe" "$bundleDir/dist/bug-resolution-radar.exe" -Force
          Copy-Item "README.md" "$bundleDir/README.md" -Force
          if (Test-Path ".env.example" -PathType Leaf) {
            Copy-Item ".env.example" "$bundleDir/.env.example" -Force
          }

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: bug-resolution-radar-windows
          path: build_bundle/bug-resolution-radar-windows
          include-hidden-files: true
          if-no-files-found: error
