name: Release Binaries

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  validate-tag:
    name: Validate tag on master
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure tagged commit is on master
        run: |
          git fetch --no-tags --depth=1 origin master
          git merge-base --is-ancestor "$GITHUB_SHA" "origin/master"

  build-release-assets:
    name: Build ${{ matrix.label }} release asset
    needs: validate-tag
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: Linux
            archive_suffix: linux
            artifact_path: build_bundle/bug-resolution-radar-linux
          - os: macos-latest
            label: macOS
            archive_suffix: macos
            artifact_path: build_bundle/bug-resolution-radar-macos.zip
          - os: windows-latest
            label: Windows
            archive_suffix: windows
            artifact_path: release_bundle/bug-resolution-radar-windows.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Setup toolchain (POSIX)
        if: runner.os != 'Windows'
        run: make setup PY=python3

      - name: Install toolchain (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          npm --prefix frontend install
          npm --prefix frontend run build

      - name: Build release asset (POSIX)
        if: runner.os != 'Windows'
        run: make build

      - name: Build release asset (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          pytest -q tests/test_run_desktop_entrypoint.py
          pytest -q tests/test_api_app.py
          pytest -q tests/test_executive_report_ppt.py
          pytest -q tests/test_period_followup_report_ppt.py
          python scripts/update_app_icon.py --input assets/app_icon/bug-resolution-radar.png

          $args = @(
            "--noconfirm",
            "--clean",
            "--onefile",
            "--windowed",
            "--name", "bug-resolution-radar",
            "--icon", "assets/app_icon/bug-resolution-radar.ico",
            "--workpath", "build",
            "--specpath", "build",
            "--distpath", "dist",
            "--add-data", "frontend/dist;frontend_dist",
            "--paths", "src",
            "--collect-all", "bug_resolution_radar.analytics",
            "--collect-all", "bug_resolution_radar.api",
            "--collect-all", "bug_resolution_radar.common",
            "--collect-all", "bug_resolution_radar.ingest",
            "--collect-all", "bug_resolution_radar.models",
            "--collect-all", "bug_resolution_radar.repositories",
            "--collect-all", "bug_resolution_radar.reports",
            "--collect-all", "bug_resolution_radar.services",
            "--collect-all", "bug_resolution_radar.theme",
            "--collect-all", "fastapi",
            "--collect-all", "starlette",
            "--collect-all", "uvicorn",
            "--collect-all", "webview",
            "--collect-all", "plotly",
            "--collect-all", "pptx",
            "--collect-all", "lxml",
            "--collect-all", "PIL",
            "--collect-all", "openpyxl",
            "--collect-all", "xlsxwriter",
            "--collect-all", "numpy",
            "--collect-all", "browser_cookie3",
            "run_desktop.py"
          )
          if (Test-Path ".env.example" -PathType Leaf) {
            $args += @("--add-data", ".env.example;.")
          }
          pyinstaller @args

          $bundleDir = "release_bundle/bug-resolution-radar-windows"
          New-Item -ItemType Directory -Force -Path "$bundleDir/dist" | Out-Null
          Copy-Item "dist/bug-resolution-radar.exe" "$bundleDir/dist/bug-resolution-radar.exe" -Force
          Copy-Item "README.md" "$bundleDir/README.md" -Force
          if (Test-Path ".env.example" -PathType Leaf) {
            Copy-Item ".env.example" "$bundleDir/.env.example" -Force
          }
          if (Test-Path "release_bundle/bug-resolution-radar-windows.zip" -PathType Leaf) {
            Remove-Item "release_bundle/bug-resolution-radar-windows.zip" -Force
          }
          Compress-Archive -Path "$bundleDir\*" -DestinationPath "release_bundle/bug-resolution-radar-windows.zip"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_path }}
