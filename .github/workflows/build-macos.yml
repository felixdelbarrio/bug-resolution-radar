name: Build Binary (macOS)

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-macos:
    if: github.ref == 'refs/heads/master'
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Setup local toolchain (venv + deps)
        run: make setup PY=python3

      - name: Build .app bundle (with PPT regression guard)
        run: make build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: bug-resolution-radar-macos
          path: build_bundle/bug-resolution-radar-macos.zip
          if-no-files-found: error
