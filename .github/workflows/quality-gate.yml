name: Quality Gate

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          npm --prefix frontend install

      - name: Dependency integrity guard
        run: pip check

      - name: Frontend build guard
        run: npm --prefix frontend run build

      - name: Documentation integrity guard
        run: python scripts/check_docs_references.py

      - name: Dead private helper guard
        run: python scripts/check_dead_private_helpers.py

      - name: Critical runtime/reporting regression guard
        run: |
          pytest -q tests/test_run_desktop_entrypoint.py
          pytest -q tests/test_api_app.py
          pytest -q tests/test_executive_report_ppt.py -k "kaleido_png_bytes_uses_cache or prerender_section_images_populates_payload"
