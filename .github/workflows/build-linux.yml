name: Build Binary (Linux)

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-linux:
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Setup local toolchain (venv + deps)
        run: make setup PY=python3

      - name: Build binary (with PPT regression guard)
        run: make build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: bug-resolution-radar-linux
          path: build_bundle/bug-resolution-radar-linux
          include-hidden-files: true
          if-no-files-found: error
